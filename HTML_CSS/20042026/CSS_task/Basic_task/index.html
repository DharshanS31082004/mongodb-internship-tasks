<!DOCTYPE html>
<html>
<head>
    <title>Advanced Tasks</title>

    <style>
        body {
            background-color: lightgray;
            text-align: center;
        }

        h1, h2 {
            color: darkblue;
        }

        .card {
            padding: 15px;
            border: 2px solid black;
            margin: 10px;
        }

        p {
            font-size: 18px;
        }
    </style>

</head>
<body>

<header>
    <h1>Intern Profiles</h1>
</header>

<main>

    <!-- PROFILE CARDS -->
    <section>

        <div class="card">
            <img src="https://picsum.photos/150" alt="Profile">
            <h2>Dharshan</h2>
            <p>Data Science Intern</p>
            <button>View Profile</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/150" alt="Profile">
            <h2>Rahul</h2>
            <p>Web Developer Intern</p>
            <button>View Profile</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/150" alt="Profile">
            <h2>Anjali</h2>
            <p>AI Intern</p>
            <button>View Profile</button>
        </div>

    </section>

    <!-- FORM -->
    <section>
        <h2>Application Form</h2>

        <form>

            <label for="name">Name:</label><br>
            <input type="text" id="name"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email"><br><br>

            <label for="role">Select Role:</label><br>
            <select id="role">
                <option>Data Science</option>
                <option>Web Development</option>
                <option>AI</option>
            </select><br><br>

            <label for="agree">I agree to terms</label>
            <input type="checkbox" id="agree"><br><br>

            <button type="submit">Submit</button>

        </form>
    </section>

</main>

<footer>
    <p>© 2026 Internship Task</p>
</footer>

</body>
</html>
