<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Intermediate Tasks</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- 3. NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">My App</a>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-4">

    <h1 class="text-center mb-4">Intern Profiles</h1>

    <!-- 1. 3-COLUMN GRID -->
    <div class="row">

        <!-- CARD 1 -->
        <div class="col-md-6 col-lg-4 mb-4">
            <div class="card">
                <img src="https://picsum.photos/200" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Dharshan</h5>
                    <p class="card-text">Data Science Intern</p>
                    <button class="btn btn-primary">View</button>
                </div>
            </div>
        </div>

        <!-- CARD 2 -->
        <div class="col-md-6 col-lg-4 mb-4">
            <div class="card">
                <img src="https://picsum.photos/200" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Rahul</h5>
                    <p class="card-text">Web Developer Intern</p>
                    <button class="btn btn-success">View</button>
                </div>
            </div>
        </div>

        <!-- CARD 3 -->
        <div class="col-md-6 col-lg-4 mb-4">
            <div class="card">
                <img src="https://picsum.photos/200" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Anjali</h5>
                    <p class="card-text">AI Intern</p>
                    <button class="btn btn-warning">View</button>
                </div>
            </div>
        </div>

    </div>

    <!-- 4. FORM -->
    <div class="mt-5">
        <h2>Contact Form</h2>

        <form>
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control">
            </div>

            <button class="btn btn-primary">Submit</button>
        </form>
    </div>

</div>

<!-- Bootstrap JS (optional but good practice) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
