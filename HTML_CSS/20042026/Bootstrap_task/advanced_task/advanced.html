<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Advanced Tasks</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            background-color: #f5f5f5;
        }

        .card:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }

        .pricing-card {
            border: 2px solid #ddd;
            border-radius: 10px;
        }

        .pricing-card:hover {
            border-color: blue;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Dashboard</span>
    </div>
</nav>

<div class="container mt-4">

    <!-- 2. DASHBOARD LAYOUT -->
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 bg-light p-3">
            <h5>Menu</h5>
            <ul class="list-group">
                <li class="list-group-item">Home</li>
                <li class="list-group-item">Profile</li>
                <li class="list-group-item">Settings</li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-md-9">

            <h2 class="mb-4 text-center">Intern Profiles</h2>

            <!-- 1. RESPONSIVE CARD LAYOUT -->
            <div class="row">

                <div class="col-12 col-md-6 col-lg-4 mb-4">
                    <div class="card text-center p-3">
                        <img src="https://picsum.photos/150" class="mx-auto">
                        <h5 class="mt-2">Dharshan</h5>
                        <p>Data Science</p>
                        <button class="btn btn-primary">View</button>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-4 mb-4">
                    <div class="card text-center p-3">
                        <img src="https://picsum.photos/150" class="mx-auto">
                        <h5 class="mt-2">Rahul</h5>
                        <p>Web Dev</p>
                        <button class="btn btn-success">View</button>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-4 mb-4">
                    <div class="card text-center p-3">
                        <img src="https://picsum.photos/150" class="mx-auto">
                        <h5 class="mt-2">Anjali</h5>
                        <p>AI</p>
                        <button class="btn btn-warning">View</button>
                    </div>
                </div>

            </div>

            <!-- 4. PRICING SECTION -->
            <h2 class="text-center mt-5">Pricing Plans</h2>

            <div class="row mt-4 text-center">

                <div class="col-md-4 mb-3">
                    <div class="pricing-card p-4">
                        <h4>Basic</h4>
                        <h3>₹199</h3>
                        <p>1 Project</p>
                        <button class="btn btn-outline-primary">Choose</button>
                    </div>
                </div>

                <div class="col-md-4 mb-3">
                    <div class="pricing-card p-4">
                        <h4>Standard</h4>
                        <h3>₹499</h3>
                        <p>5 Projects</p>
                        <button class="btn btn-outline-success">Choose</button>
                    </div>
                </div>

                <div class="col-md-4 mb-3">
                    <div class="pricing-card p-4">
                        <h4>Premium</h4>
                        <h3>₹999</h3>
                        <p>Unlimited</p>
                        <button class="btn btn-outline-danger">Choose</button>
                    </div>
                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
